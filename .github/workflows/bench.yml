name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FEATURES: "std avx512"

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            bench: summon_overhead asm_inspection asm_patterns
          - os: ubuntu-24.04-arm
            name: Linux aarch64
            bench: tokens
          - os: macos-latest
            name: macOS aarch64
            bench: tokens
          - os: macos-26-intel
            name: macOS x86_64
            bench: summon_overhead asm_inspection asm_patterns
          - os: windows-latest
            name: Windows x86_64
            bench: summon_overhead asm_inspection asm_patterns
          - os: windows-11-arm
            name: Windows aarch64
            bench: tokens
    name: bench (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: CPU survey
        shell: bash
        run: cargo run --example cpu_survey --features "avx512" 2>&1 | tee cpu-survey.txt

      - name: Run benchmarks
        shell: bash
        run: |
          for bench in ${{ matrix.bench }}; do
            echo "=== Running bench: $bench ==="
            cargo bench --bench "$bench" --features "${{ env.FEATURES }}" -- --noplot 2>&1 | tee -a bench-output.txt
          done

      - name: Upload bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.name }}
          path: bench-output.txt

      - name: Upload CPU survey
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-survey-bench-${{ matrix.name }}
          path: cpu-survey.txt
