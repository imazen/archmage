name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CI: true
  # All stable features
  FEATURES: "std avx512"

jobs:
  # ==========================================================================
  # Primary: Native x64 testing (stable only - MSRV tested separately)
  # ==========================================================================
  test-x64:
    name: Test x64 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-26-intel]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-expand
        run: cargo install cargo-expand --locked

      - name: Build
        run: cargo build --features "${{ env.FEATURES }}"

      - name: Run tests
        run: cargo test --features "${{ env.FEATURES }}"

      # token_infrastructure uses dangerously_disable_token_process_wide() —
      # process-wide state that races when tests run in parallel.
      - name: Run token infrastructure tests (serialized)
        run: cargo test --features "${{ env.FEATURES }}" --test token_infrastructure -- --test-threads=1

      # Standalone test crates verify avx512 feature gating behavior.
      # NOT workspace members (to avoid feature unification).
      - name: Test avx512 cfg (with feature)
        run: cargo test --manifest-path tests/avx512-cfg-tests/with-avx512-feature/Cargo.toml
      - name: Test avx512 cfg (passthrough, with feature)
        run: cargo test --manifest-path tests/avx512-cfg-tests/with-avx512-passthrough/Cargo.toml --features avx512
      - name: Test avx512 cfg (passthrough, without feature)
        run: cargo test --manifest-path tests/avx512-cfg-tests/with-avx512-passthrough/Cargo.toml
      - name: Test avx512 cfg (v4 value intrinsics, no avx512)
        run: cargo test --manifest-path tests/avx512-cfg-tests/v4-no-import-intrinsics/Cargo.toml
      - name: Test avx512 cfg (all token forms)
        run: cargo test --manifest-path tests/avx512-cfg-tests/v4-all-token-forms/Cargo.toml

      # Downstream compatibility: published linear-srgb against local archmage.
      # linear-srgb uses incant! with explicit [v4, v3, neon] tier lists and
      # cfg-gated _v4 functions — the pattern that motivated skip_avx512.
      - name: Downstream compat (linear-srgb, no avx512)
        run: cargo check --manifest-path tests/downstream-compat/linear-srgb/Cargo.toml
      - name: Downstream compat (linear-srgb, with avx512)
        run: cargo check --manifest-path tests/downstream-compat/linear-srgb/Cargo.toml --features avx512
      - name: Downstream compat (zensim)
        run: cargo check --manifest-path tests/downstream-compat/zensim/Cargo.toml
      - name: Downstream compat (zenpixels-convert)
        run: cargo check --manifest-path tests/downstream-compat/zenpixels-convert/Cargo.toml

      - name: CPU survey
        if: always()
        shell: bash
        run: cargo run --example cpu_survey --features "avx512" 2>&1 | tee cpu-survey.txt

      - name: Upload CPU survey
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-survey-test-x64-${{ matrix.os }}
          path: cpu-survey.txt

      - name: Run arch exercise
        if: always()
        shell: bash
        run: cargo run -p magetypes --example arch_exercise --features "${{ env.FEATURES }}" > arch-results.jsonl

      - name: Upload arch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-results-x64-${{ matrix.os }}
          path: arch-results.jsonl

  # ==========================================================================
  # Primary: Native ARM64 testing
  # ==========================================================================
  test-aarch64:
    name: Test aarch64 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04-arm, name: Linux }
          - { os: macos-14, name: macOS 14 }
          - { os: macos-latest, name: macOS latest }
          - { os: windows-11-arm, name: Windows }

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-expand
        run: cargo install cargo-expand --locked

      - name: Build
        run: cargo build --features "${{ env.FEATURES }}"

      - name: Run tests
        run: cargo test --features "${{ env.FEATURES }}"

      # token_infrastructure uses dangerously_disable_token_process_wide() —
      # process-wide state that races when tests run in parallel.
      - name: Run token infrastructure tests (serialized)
        run: cargo test --features "${{ env.FEATURES }}" --test token_infrastructure -- --test-threads=1

      # Cobalt 100 / Neoverse N2 hardware assertions. GH `windows-11-arm`
      # and `ubuntu-24.04-arm` are both this CPU, so we know V2 + V3 must
      # detect. On Windows this is the load-bearing assertion that the
      # `winarm-cpufeatures` registry-backed path is actually working;
      # without it, a regression in detection silently degrades to skip.
      - name: Cobalt 100 token-detection hardware assertions
        if: matrix.os == 'windows-11-arm' || matrix.os == 'ubuntu-24.04-arm'
        run: cargo test --features "${{ env.FEATURES }}" --test arm_feature_intrinsics -- --ignored cobalt100_runner_must_summon_full_arm64_v3

      - name: CPU survey
        if: always()
        shell: bash
        run: cargo run --example cpu_survey --features "avx512" 2>&1 | tee cpu-survey.txt

      - name: Upload CPU survey
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-survey-test-aarch64-${{ matrix.os }}
          path: cpu-survey.txt

      - name: Run arch exercise
        if: always()
        shell: bash
        run: cargo run -p magetypes --example arch_exercise --features "${{ env.FEATURES }}" > arch-results.jsonl

      - name: Upload arch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-results-aarch64-${{ matrix.name }}
          path: arch-results.jsonl

  # ==========================================================================
  # Cross-compiled testing with QEMU emulation
  # ==========================================================================
  test-cross:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-expand
        run: cargo install cargo-expand --locked

      - name: Build (cross)
        run: cross build --features "${{ env.FEATURES }}" --target ${{ matrix.target }}

      - name: Test archmage (cross/QEMU)
        run: cross test -p archmage --features "${{ env.FEATURES }}" --target ${{ matrix.target }}

      # magetypes integration tests (scalar_parity, exhaustive_intrinsics,
      # bypass_closed, generic_*, transcendental_*, polyfill_*, …) only
      # run here when explicitly selected — bare `cross test` from the
      # workspace root picks up only the root crate. Issue #39 tracks the
      # NEON precision fix that made these pass under QEMU.
      - name: Test magetypes (cross/QEMU)
        run: cross test -p magetypes --features "${{ env.FEATURES }}" --target ${{ matrix.target }}

      # archmage-no-features-test compiles with #![deny(warnings)]. It
      # exercises #[autoversion] with explicit non-x86 tier lists — the
      # exact pattern that triggered issue #34's unused_imports warnings on
      # 32-bit x86 (where every dispatch arm is cfg'd out).
      - name: Test no-features-crate (cross/QEMU)
        run: cross test -p archmage-no-features-test --target ${{ matrix.target }}

  # ==========================================================================
  # WASM SIMD128 testing
  # ==========================================================================
  test-wasm:
    name: Test WASM SIMD128
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Build archmage for WASM
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
        run: cargo build -p archmage --target wasm32-wasip1

      - name: Build magetypes for WASM
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
        run: cargo build -p magetypes --target wasm32-wasip1

      # archmage's integration tests pull `proptest` + `wait-timeout` which
      # don't compile on wasm32-wasip1, so stick to --lib + the two
      # WASM-friendly integration tests for archmage.
      - name: Test archmage on WASM (wasmtime)
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime"
        run: cargo test -p archmage --lib --features "${{ env.FEATURES }}" --target wasm32-wasip1

      - name: Test archmage wasm_intrinsics_exercise
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime"
        run: cargo test -p archmage --test wasm_intrinsics_exercise --features "${{ env.FEATURES }}" --target wasm32-wasip1

      - name: Test archmage feature_consistency (WASM)
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime"
        run: cargo test -p archmage --test feature_consistency --features "${{ env.FEATURES }}" --target wasm32-wasip1

      # magetypes integration tests compile cleanly on WASM and catch
      # the WASM-specific polyfill bugs that `--lib` alone never sees
      # (see commit 6ea5448 / issue #39). Runs the full integration
      # suite: scalar_parity, exhaustive_intrinsics, bypass_closed,
      # bypass_adversarial doctests, generic_*, transcendental_*,
      # polyfill_parity, polyfill_verification, etc.
      - name: Test magetypes on WASM (wasmtime)
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime"
        run: cargo test -p magetypes --features "${{ env.FEATURES }}" --target wasm32-wasip1

      - name: Run arch exercise (WASM)
        if: always()
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime"
        run: cargo run -p magetypes --example arch_exercise --target wasm32-wasip1 > arch-results.jsonl

      - name: Upload arch results (WASM)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-results-wasm
          path: arch-results.jsonl

  # ==========================================================================
  # Generation check - ensure generated code matches committed code
  # ==========================================================================
  generate-check:
    name: Generation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run generator
        run: |
          cargo fetch
          cargo run -p xtask -- generate

      - name: Check for differences
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::Generated code differs from committed code!"
            echo "Run 'just generate' locally and commit the changes."
            git diff --stat
            exit 1
          fi
          echo "All generated code matches committed code"

  # ==========================================================================
  # Safety validation - ensure token bounds provide required features
  # ==========================================================================
  validate-safety:
    name: Validate Token Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate magetypes safety
        run: cargo run -p xtask -- validate

  # ==========================================================================
  # Soundness verification - ensure intrinsics match token features
  # ==========================================================================
  soundness:
    name: Soundness Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify intrinsic soundness
        run: cargo run -p xtask -- soundness

  # ==========================================================================
  # API parity check - ensure consistent APIs across architectures
  # ==========================================================================
  parity:
    name: API Parity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check API parity
        run: cargo run -p xtask -- parity

  # ==========================================================================
  # Miri - undefined behavior detection
  # ==========================================================================
  miri:
    name: Miri (UB Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          # Pin nightly: 2026-02-11 has a Miri bug with getrandom's build script
          toolchain: nightly-2026-02-03
          components: miri

      - name: Setup Miri
        run: cargo miri setup

      - name: Run Miri on magetypes
        run: cargo miri test -p magetypes --features avx512

      - name: Run Miri on archmage
        run: cargo miri test -p archmage --lib --features avx512

      - name: Run Miri on miri_safe
        run: cargo miri test --test miri_safe --features "${{ env.FEATURES }}"

  # ==========================================================================
  # Fuzz testing - property-based divergence detection
  # ==========================================================================
  fuzz:
    name: Fuzz (Divergence Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run fuzz tests
        run: cargo test -p magetypes --test fuzz_divergence --features avx512

  # ==========================================================================
  # Clippy
  # ==========================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --features "${{ env.FEATURES }}" -- -D warnings

  # ==========================================================================
  # Format check
  # ==========================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  # ==========================================================================
  # Documentation
  # ==========================================================================
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --features "${{ env.FEATURES }}" --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings

  # ==========================================================================
  # MSRV check — verify advertised MSRV on every platform
  # ==========================================================================
  msrv:
    name: MSRV 1.89 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: x64 Linux }
          - { os: windows-latest, name: x64 Windows }
          - { os: macos-26-intel, name: x64 macOS Intel }
          - { os: ubuntu-24.04-arm, name: aarch64 Linux }
          - { os: macos-14, name: aarch64 macOS }
          - { os: windows-11-arm, name: aarch64 Windows }
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --features "${{ env.FEATURES }}"

      - name: CPU survey
        if: always()
        shell: bash
        run: cargo run --example cpu_survey --features "avx512" 2>&1 | tee cpu-survey.txt

      - name: Upload CPU survey
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-survey-msrv-${{ matrix.os }}
          path: cpu-survey.txt

  # ==========================================================================
  # Feature Combination Testing
  # ==========================================================================
  feature-combos:
    name: Features (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "no-default-features", build: "--no-default-features", test: "--no-default-features --lib" }
          - { name: "std-only", build: "--features std", test: "--features std --lib" }
          - { name: "macros-only", build: "--features macros", test: "--features macros" }
          - { name: "avx512-only", build: "--features avx512", test: "--features avx512 --lib" }
          - { name: "std+macros", build: "--features 'std macros'", test: "--features 'std macros'" }
          - { name: "std+avx512", build: "--features 'std avx512'", test: "--features 'std avx512' --lib" }
          - { name: "macros+avx512", build: "--features 'macros avx512'", test: "--features 'macros avx512'" }
          - { name: "all-features", build: "--all-features", test: "--all-features" }

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-expand
        run: cargo install cargo-expand --locked

      - name: Build
        run: cargo build ${{ matrix.build }}

      - name: Test
        run: cargo test ${{ matrix.test }}

  # ==========================================================================
  # Testable dispatch — CompileTimePolicy::Fail must succeed
  # Also runs detect_features variants (merged from bench detect-testable-dispatch)
  # ==========================================================================
  testable-dispatch:
    name: Testable Dispatch (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: x64 Linux }
          - { os: ubuntu-24.04-arm, name: aarch64 Linux }
          - { os: macos-latest, name: aarch64 macOS latest }
          - { os: macos-14, name: aarch64 macOS 14 }
          - { os: windows-11-arm, name: aarch64 Windows }

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test with testable_dispatch + CompileTimePolicy::Fail
        run: cargo test --features "std avx512 testable_dispatch" --test token_permutations -- --test-threads=1

      - name: Detect features (default)
        shell: bash
        run: cargo run --example detect_features --features "${{ env.FEATURES }}" 2>&1 | tee detect-features.txt

      - name: Detect features (testable_dispatch)
        shell: bash
        run: cargo run --example detect_features --features "${{ env.FEATURES }} testable_dispatch" 2>&1 | tee -a detect-features.txt

      - name: Detect features (testable_dispatch + target-cpu=native)
        shell: bash
        run: cargo run --example detect_features --features "${{ env.FEATURES }} testable_dispatch" 2>&1 | tee -a detect-features.txt
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Detect features (target-cpu=native, no testable_dispatch)
        shell: bash
        run: cargo run --example detect_features --features "${{ env.FEATURES }}" 2>&1 | tee -a detect-features.txt
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: CPU survey
        if: always()
        shell: bash
        run: cargo run --example cpu_survey --features "avx512" 2>&1 | tee cpu-survey.txt

      - name: Upload detect features
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detect-features-${{ matrix.os }}
          path: detect-features.txt

      - name: Upload CPU survey
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-survey-testable-dispatch-${{ matrix.os }}
          path: cpu-survey.txt

  # ==========================================================================
  # Intel SDE CPU emulation tests (absorbed from sde-test.yml)
  # ==========================================================================
  sde:
    name: SDE ${{ matrix.cpu.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cpu:
          # Pentium 4 (-p4) removed: SDE's Pentium 4 model is 32-bit only
          # and cannot run 64-bit test binaries.
          - { name: "Nehalem (SSE4.2)", flag: "-nhm" }
          - { name: "Haswell (AVX2+FMA)", flag: "-hsw" }
          - { name: "Skylake-X (AVX-512)", flag: "-skx" }
          - { name: "Ice Lake (AVX-512 VBMI2)", flag: "-icl" }

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download Intel SDE
        run: |
          wget -q https://downloadmirror.intel.com/831748/sde-external-9.44.0-2024-08-22-lin.tar.xz
          tar -xf sde-external-9.44.0-2024-08-22-lin.tar.xz
          echo "$PWD/sde-external-9.44.0-2024-08-22-lin" >> $GITHUB_PATH

      - name: Build tests
        run: cargo test --features "${{ env.FEATURES }}" --no-run

      - name: Run tests under SDE (${{ matrix.cpu.name }})
        run: |
          # Find the test binary
          TEST_BIN=$(find target/debug/deps -name 'archmage-*' -type f -executable | head -1)
          echo "Running: sde64 ${{ matrix.cpu.flag }} -- $TEST_BIN"
          sde64 ${{ matrix.cpu.flag }} -- $TEST_BIN

      - name: Run integration tests under SDE
        run: |
          for test in target/debug/deps/*-*; do
            if [ -x "$test" ] && [ -f "$test" ]; then
              name=$(basename "$test")
              # Skip macro_expand — it spawns cargo-expand subprocesses (not CPU-specific)
              # Skip compile_fail — trybuild spawns rustc (not CPU-specific)
              case "$name" in
                macro_expand-*|compile_fail-*) echo "Skipping: $name (not CPU-specific)"; continue ;;
              esac
              echo "Running: $test"
              sde64 ${{ matrix.cpu.flag }} -- "$test" || true
            fi
          done

      - name: CPU survey
        if: always()
        shell: bash
        run: cargo run --example cpu_survey --features "avx512" 2>&1 | tee cpu-survey.txt

      - name: Upload CPU survey
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-survey-sde-${{ matrix.cpu.name }}
          path: cpu-survey.txt

  # ==========================================================================
  # Code Coverage (x86_64)
  # ==========================================================================
  coverage:
    name: Coverage (x86_64)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-expand
        run: cargo install cargo-expand --locked

      - name: Generate coverage
        run: cargo llvm-cov --features "${{ env.FEATURES }}" --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: x86_64
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================================================
  # Code Coverage (aarch64) — covers ARM-specific paths
  # ==========================================================================
  coverage-aarch64:
    name: Coverage (aarch64)
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-expand
        run: cargo install cargo-expand --locked

      - name: Generate coverage
        run: cargo llvm-cov --features "${{ env.FEATURES }}" --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: aarch64
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================================================
  # Cross-architecture SIMD parity comparison
  # ==========================================================================
  compare-arch-results:
    name: Compare Architecture Results
    runs-on: ubuntu-latest
    needs: [test-x64, test-aarch64, test-wasm]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download all arch results
        uses: actions/download-artifact@v4
        with:
          pattern: arch-results-*
          path: arch-results/

      - name: List collected artifacts
        run: find arch-results/ -name '*.jsonl' -exec echo {} \; -exec wc -l {} \;

      - name: Compare results across architectures
        run: |
          mapfile -t FILES < <(find arch-results/ -name '*.jsonl' 2>/dev/null | sort)
          echo "Found ${#FILES[@]} arch result files"
          if [ "${#FILES[@]}" -lt 2 ]; then
            echo "Need at least 2 architecture result files to compare. Skipping."
            exit 0
          fi
          printf "  %s\n" "${FILES[@]}"
          cargo run -p xtask -- compare-arch-results "${FILES[@]}"
