name: Deploy Book

on:
  push:
    branches: [main]
    paths:
      - 'docs/book/**'
      - 'docs/intrinsics-browser/**'
      - '.github/workflows/book.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook and mdbook-mermaid
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/bin
          curl -sSL https://github.com/badboy/mdbook-mermaid/releases/download/v0.17.0/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install mermaid.js assets
        run: mdbook-mermaid install docs/book

      - name: Build book
        run: mdbook build docs/book

      - name: Copy intrinsics browser into book output
        run: |
          mkdir -p target/book/intrinsics
          cp -r docs/intrinsics-browser/* target/book/intrinsics/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
