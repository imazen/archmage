name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'docs/intrinsics-browser/**'
      - '.github/workflows/book.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true  # Fetch Goyo theme submodule

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          mkdir -p $HOME/bin
          curl -sSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build site
        run: cd docs/site && zola build -o ../../target/site

      - name: Copy intrinsics browser into site output
        run: |
          mkdir -p target/site/intrinsics
          cp -r docs/intrinsics-browser/* target/site/intrinsics/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
