name: CPU Survey (Hardware Catalog)

# Catalog-only: runners not already covered by CI or bench workflows.
# CI covers: ubuntu-latest, windows-latest, ubuntu-24.04-arm, macos-14, macos-latest, windows-11-arm
# Bench covers: macos-26-intel
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  survey:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 Linux (specific versions)
          - { os: ubuntu-24.04, name: "Ubuntu 24.04 (x64)" }
          - { os: ubuntu-22.04, name: "Ubuntu 22.04 (x64)" }
          # ARM64 Linux (older)
          - { os: ubuntu-22.04-arm, name: "Ubuntu 22.04 ARM64 (Cobalt 100)" }
          # x86_64 Windows (specific versions)
          - { os: windows-2025, name: "Windows 2025 (x64)" }
          - { os: windows-2022, name: "Windows 2022 (x64)" }
          # ARM64 macOS (specific versions)
          - { os: macos-15, name: "macOS 15 (Apple M1)" }
          - { os: macos-26, name: "macOS 26 (Apple M-series)" }
          # x86_64 macOS
          - { os: macos-15-intel, name: "macOS 15 Intel (Xeon W)" }

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: CPU survey
        shell: bash
        run: cargo run --example cpu_survey --features "avx512" 2>&1 | tee cpu-survey.txt

      - name: Upload CPU survey
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-survey-catalog-${{ matrix.os }}
          path: cpu-survey.txt
