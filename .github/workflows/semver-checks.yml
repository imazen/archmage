name: Semver Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Superseded runs only waste runner queue — particularly the macOS
# jobs, which wait on GitHub's scarcest pool. Only the newest
# commit's run matters per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semver:
    name: Semver (${{ matrix.crate }})
    runs-on: ubuntu-latest
    # TEMPORARY for the 0.9.27 release: the concrete-type retirement + prelude
    # reshape are a deliberate breaking change shipped on the 0.9 chain (narrow
    # break, 0 consumers). semver-checks correctly flags it against the 0.9.26
    # baseline, so make the job advisory just for this release. REVERT this line
    # after 0.9.27 publishes — once the baseline is 0.9.27 the gate passes again.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        crate: [archmage, magetypes]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: ${{ matrix.crate }}
