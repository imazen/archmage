name: Publish to crates.io

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  CI: true
  FEATURES: "std macros avx512"

jobs:
  # ==========================================================================
  # Verify tags and versions
  # ==========================================================================
  check-tags:
    name: Check Release Tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "::error::Release tag '$TAG' does not match expected format v{version}"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Verify all required tags exist and match
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FIRST_COMMIT=""
          for TAG in "v${VERSION}" "archmage-macros-v${VERSION}" "magetypes-v${VERSION}"; do
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              COMMIT=$(git rev-parse "$TAG")
              echo "✓ $TAG -> $COMMIT"
              if [ -z "$FIRST_COMMIT" ]; then
                FIRST_COMMIT="$COMMIT"
              elif [ "$COMMIT" != "$FIRST_COMMIT" ]; then
                echo "::error::Tag $TAG points to $COMMIT, expected $FIRST_COMMIT"
                exit 1
              fi
            else
              echo "::error::Tag $TAG is MISSING"
              echo "Required: v${VERSION}, archmage-macros-v${VERSION}, magetypes-v${VERSION}"
              exit 1
            fi
          done

      - name: Verify Cargo.toml versions match tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for CRATE in "." "archmage-macros" "magetypes"; do
            TOML_VERSION=$(grep '^version' "$CRATE/Cargo.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "$TOML_VERSION" != "$VERSION" ]; then
              echo "::error::$CRATE/Cargo.toml version ($TOML_VERSION) does not match tag ($VERSION)"
              exit 1
            fi
            echo "✓ $CRATE/Cargo.toml: $TOML_VERSION"
          done

  # ==========================================================================
  # Run generation check + clippy + tests before publishing
  # ==========================================================================
  pre-publish-check:
    name: Pre-publish Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Generate and verify clean
        run: |
          cargo fetch
          cargo run -p xtask -- generate
          if ! git diff --exit-code; then
            echo "::error::Generated code differs from committed code!"
            exit 1
          fi

      - name: Clippy
        run: cargo clippy --features "${{ env.FEATURES }}" -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Tests
        run: cargo test --features "${{ env.FEATURES }}"

      - name: Validate safety
        run: cargo run -p xtask -- validate

      - name: Soundness verification
        run: cargo run -p xtask -- soundness

      - name: Verify all crates package and build
        run: cargo publish --workspace --dry-run

  # ==========================================================================
  # Publish all workspace crates in dependency order
  # cargo handles: ordering, temp registry for workspace deps, index polling
  # ==========================================================================
  publish:
    name: Publish Crates
    runs-on: ubuntu-latest
    needs: [check-tags, pre-publish-check]
    environment: crates-io
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --workspace
